name: Sync BIST feed

# Free hosting model: GitHub Actions runs the Playwright scraper on a schedule,
# commits data/feed.json back to the repo. The iOS app reads it from the jsDelivr
# CDN (https://cdn.jsdelivr.net/gh/<user>/<repo>@main/data/feed.json) — zero server cost.

on:
  schedule:
    - cron: "0 7,11,15,19 * * *" # 4×/day (UTC); BIST disclosure hours
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      # Opt into the Node 24 action runtime (silences the Node 20 deprecation).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    defaults:
      run:
        working-directory: scraper
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: scraper/package-lock.json

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Run sync
        run: npx tsx src/index.ts 4

      - name: Commit feed
        id: commit
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name  "bistradar-bot"
          git config user.email "bot@users.noreply.github.com"
          if ! git diff --quiet -- data/feed.json; then
            git add data/feed.json
            git commit -m "chore: sync feed $(date -u +%FT%TZ)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No feed changes."
          fi

      # jsDelivr caches the @main branch ~12h; purge so the app sees fresh data.
      - name: Purge jsDelivr cache
        if: steps.commit.outputs.changed == 'true'
        run: curl -sf "https://purge.jsdelivr.net/gh/onurkuru/bistradar@main/data/feed.json" || true
