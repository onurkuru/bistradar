name: BistRadar
options:
  bundleIdPrefix: com.onurkuru
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_LANGUAGE: tr
packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: "12.0.0"
targets:
  BistRadar:
    type: application
    platform: iOS
    sources:
      - App
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Arz Radar
        CFBundleLocalizations: [tr, en]
        CFBundleDevelopmentRegion: tr
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        BGTaskSchedulerPermittedIdentifiers:
          - com.onurkuru.bistradar.refresh
        UIBackgroundModes:
          - fetch
          - processing
        # AdMob App ID for "BIST Radar" (publisher pub-4124204377269696).
        GADApplicationIdentifier: ca-app-pub-4124204377269696~3084694454
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
          - SKAdNetworkIdentifier: 4fzdc2evr5.skadnetwork
          - SKAdNetworkIdentifier: 2fnua5tdw4.skadnetwork
          - SKAdNetworkIdentifier: ydx93a7ass.skadnetwork
          - SKAdNetworkIdentifier: p78axxw29g.skadnetwork
          - SKAdNetworkIdentifier: v72qych5uu.skadnetwork
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.onurkuru.bistradar
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
  BistRadarTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
      - path: App/Models
      - path: App/Services/FeedFormatting.swift
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
schemes:
  BistRadar:
    build:
      targets:
        BistRadar: all
    run:
      config: Debug
      storeKitConfiguration: BistRadar.storekit
    test:
      config: Debug
      targets:
        - BistRadarTests
