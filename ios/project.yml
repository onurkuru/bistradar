name: BistRadar
options:
  bundleIdPrefix: com.onurkuru
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_LANGUAGE: tr
targets:
  BistRadar:
    type: application
    platform: iOS
    sources:
      - App
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: BIST Radar
        CFBundleLocalizations: [tr, en]
        CFBundleDevelopmentRegion: tr
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        BGTaskSchedulerPermittedIdentifiers:
          - com.onurkuru.bistradar.refresh
        UIBackgroundModes:
          - fetch
          - processing
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.onurkuru.bistradar
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
  BistRadarTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
      - path: App/Models
      - path: App/Services/FeedFormatting.swift
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
schemes:
  BistRadar:
    build:
      targets:
        BistRadar: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BistRadarTests
